                        <div class="card card-simulador">
                            <h2>Novo item</h2>
                            <div class="formulario">
                                <!--
                                Para inserir mais um campo, copie uma das inputs abaixo.
                                Assim que inserir vá para o script abaixo.
                            -->

                                <div class="campo">
                                    <span>nome do produto</span>
                                    <input id="nomeProduto_input" type="text" placeholder="" />
                                </div>
                                <div class="campo">
                                    <span>tipo</span>
                                    <select id="tipo_input">
                                    <option value="Guitarra">Guitarra</option>
                                    <option value="Amplificador">Amplificador</option>
                                    <option value="Pedaleira">Pedaleira</option>
                                    <option value="Acessório">Acessório</option>
                                    </select>
                                </div>
                                <div class="campo">
                                    <span>preço</span>
                                    <input id="preco_input" type="text" placeholder="" />
                                </div>


                                <button class="botao" onclick="exibir()">Salvar</button>
                            </div>
                        </div>
                            <div class="card card-simulador">
                                <h2>Seu setup</h2>
                                <div id="msg" class="formulario"></div>
                                <button onclick="remover()">remover</button>
                            </div>
                    </div>
                
                

                                <!--

        <script>
            let cadastrados = []
        function atualizar(){

        let total = 0
        let mensagem = ""
        let temGuitarra = false
        let temAmplificador = false
        let temPedaleira = false
        let temAcessorio = false
        
        for(let i = 0; i < cadastrados.length; i++){
        let item = cadastrados[i]

        mensagem += `${item.nome}, ${item.tipo}, ${item.preco}<br>`

        total += item.preco

        console.log(cadastrados[i])

        if(item.tipo == "Guitarra"){
            temGuitarra = true
        }
        if(item.tipo == "Amplificador"){
            temAmplificador = true 
        }
        if(item.tipo == "Pedaleira"){
            temPedaleira = true
        }
        if(item.tipo == "Acessório"){
            temAcessorio = true
        }
        }

        let porcentagem = 0

        if(temGuitarra && temAmplificador && temAcessorio && temPedaleira){
            porcentagem = 25
        }
        else if(temGuitarra && temAmplificador){
            porcentagem = 10
        }

        let valor_desconto = total * (porcentagem / 100)
        let total_final = total - valor_desconto

        msg.innerHTML = `${mensagem} Subtotal: R$ ${total.toFixed(2)} <br> Desconto: ${porcentagem}% <br> Total final: R$ ${total_final.toFixed(2)}`

        nomeProduto_input.value = ""
        preco_input.value = ""
        tipo_input.value = "Guitarra"

        }
        function exibir(){

        let nome = nomeProduto_input.value
        let tipo = tipo_input.value
        let preco = Number(preco_input.value)

        if(nome == "" || preco <= 0){
        msg.innerHTML = `preencha corretamente`
        return
        }   

        cadastrados.push({
            nome: nome,
            tipo: tipo,
            preco: preco
            }
        )
        atualizar()
        }

        function remover(){
            
        if(cadastrados.length == 0){
        return
        }

        else{
        let removido = cadastrados.pop()
        
        msg.innerHTML = `${removido}`
        }
        
        atualizar()

        }
        </script>
